
services:

  # MYSQL 
  mysql:
    image: mysql:8
    container_name: joborbit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # REDIS 
  redis:
    image: redis
    container_name: joborbit-redis
    ports:
      - "6379:6379"

  # RABBITMQ 
  rabbitmq:
    image: rabbitmq:3-management
    container_name: joborbit-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

  # KAFKA 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: joborbit-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: joborbit-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # EUREKA 
  eureka:
    build: ./apps/service-registry
    container_name: joborbit-eureka
    ports:
      - "8761:8761"

  # AUTH 
  auth-service:
    build: ./apps/auth-service
    container_name: joborbit-auth
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

  # PROFILE 
  profile-service:
    build: ./apps/profile-service
    container_name: joborbit-profile
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8082:8082"
    volumes:
      - ./uploads:/app/uploads

  # FEED 
  feed-service:
    build: ./apps/feed-service
    container_name: joborbit-feed
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8084:8084"
    volumes:
      - ./uploads:/app/uploads

  # CHAT 
  chat-service:
    build: ./apps/chat-service
    container_name: joborbit-chat
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      eureka:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8086:8086"

  # CONNECTION 
  connection-service:
    build: ./apps/connection-service
    container_name: joborbit-connection
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8087:8087"

  # JOB 
  job-service:
    build: ./apps/job-service
    container_name: joborbit-job
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8083:8083"

  # GATEWAY 
  api-gateway:
    build: ./apps/api-gateway
    container_name: joborbit-gateway
    depends_on:
      eureka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}

volumes:
  mysql-data: